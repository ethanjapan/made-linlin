<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Works — made_linlin</title>
  <meta name="description" content="作品一覧。コレクション別・タグ/年で絞り込み。made_linlin の写真作品集。" />

  <!-- OG / Twitter ※独自ドメイン設定後はURLを差し替え -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="made_linlin" />
  <meta property="og:title" content="Works — made_linlin" />
  <meta property="og:description" content="風景・夜景ほか、made_linlin の写真作品一覧。" />
  <meta property="og:image" content="https://ethanjapan.github.io/made-linlin/public/og.jpg" />
  <meta property="og:url" content="https://ethanjapan.github.io/made-linlin/gallery.html" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Works — made_linlin" />
  <meta name="twitter:image" content="https://ethanjapan.github.io/made-linlin/public/og.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=Shippori+Mincho:wght@400;500;800&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/gallery.css" />
  <script src="js/i18n.js"></script>
</head>
<body class="works-body">

  <!-- スクロールで自動的に隠れる上部（検索・絞り込みを内包） -->
  <div class="works-header" id="works-header">
  <header class="works-top" id="works-top">
    <a href="index.html" class="works-back" data-i18n="works.back">← 入口の体験へ</a>
    <div class="works-brand">WORKS</div>
    <label class="works-search">
      <span class="works-search__icon" aria-hidden="true">⌕</span>
      <input id="works-search" type="search" placeholder="検索（作品名・タグ・コレクション…）" data-i18n-attr="placeholder:works.search" aria-label="作品を検索" autocomplete="off" />
    </label>
  </header>

  <!-- 絞り込み（タグ / 年）。作品が増えるほど効いてくる -->
  <div class="works-filter" id="works-filter" hidden>
    <div class="works-filter__row">
      <span class="works-filter__label" data-i18n="works.tags">タグ</span>
      <div class="works-filter__pills" id="filter-tags"></div>
    </div>
    <div class="works-filter__row" id="filter-years-row">
      <span class="works-filter__label" data-i18n="works.years">年</span>
      <div class="works-filter__pills" id="filter-years"></div>
    </div>
    <div class="works-filter__meta">
      <span id="works-count" class="works-count"></span>
      <button id="works-clear" class="works-clear" type="button" data-i18n="works.clear">クリア</button>
    </div>
  </div>
  </div><!-- /works-header -->

  <main class="works-main" id="works-main">
    <div class="works-loading" id="works-loading" data-i18n="works.loading">作品を読み込み中…</div>
    <div class="works-empty" id="works-empty" hidden data-i18n="works.empty">該当する作品がありません。</div>
  </main>

  <footer class="site-footer">
    <div>© 2026 made_linlin</div>
    <div class="site-footer__sub" data-i18n="cta.foot">Made with light.</div>
  </footer>

  <script type="module" src="js/gallery-page.js"></script>
</body>
</html>
