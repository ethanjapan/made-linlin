<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Album — made_linlin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Shippori+Mincho:wght@400;500;800&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/album.css" />
  <script src="js/i18n.js"></script>
</head>
<body class="album-body">
  <a href="index.html#gallery" class="back" id="back" data-i18n="album.back.home">← 作品選択へ戻る</a>

  <header class="album-hero" id="hero">
    <p class="album-hero__kicker">ALBUM</p>
    <h1 id="album-title">—</h1>
    <p class="album-hero__sub" id="album-sub"></p>
  </header>

  <section class="grid" id="grid"><!-- JSで流し込む --></section>

  <footer class="site-footer">
    <div>© 2026 made_linlin</div>
  </footer>

  <!-- ライトボックス -->
  <div class="lightbox" id="lightbox" aria-hidden="true">
    <button class="lightbox__close" id="lb-close" aria-label="閉じる">×</button>
    <button class="lightbox__nav lightbox__nav--prev" id="lb-prev" aria-label="前へ">‹</button>
    <button class="lightbox__nav lightbox__nav--next" id="lb-next" aria-label="次へ">›</button>
    <figure class="lightbox__fig">
      <img id="lb-img" alt="" />
      <figcaption id="lb-cap"></figcaption>
    </figure>
  </div>

  <script type="module" src="js/album.js"></script>
</body>
</html>
